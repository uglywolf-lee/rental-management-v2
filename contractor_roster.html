<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>계약자 인적 데이터 명부 (엑셀 통합형)</title>
    <style>
        :root { --primary: #6f42c1; --border: #dee2e6; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin-top: 64px !important; display: flex; background-color: #f8f9fa; }
        .left-panel { width: 35%; background: white; border-right: 1px solid var(--border); padding: 25px; overflow-y: auto; box-sizing: border-box; }
        .right-panel { width: 65%; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; background: white; }
        .panel-title { font-size: 1.1rem; color: var(--primary); margin: 0 0 20px 0; border-bottom: 2px solid var(--primary); padding-bottom: 8px; font-weight: bold; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 4px; color: #495057; }
        .form-control { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.88rem; box-sizing: border-box; }
        .btn-box { margin-top: 15px; display: flex; gap: 8px; }
        .btn { padding: 10px; border: none; border-radius: 4px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: #6c757d; color: white; }
        .excel-table-wrap { flex: 1; overflow: auto; border: 1px solid #bbc4cc; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th { background: #f1f3f5; border: 1px solid #bbc4cc; padding: 6px 8px; font-weight: 600; position: sticky; top: 0; text-align: left; }
        td { border: 1px solid #ced4da; padding: 6px 8px; white-space: nowrap; color: #333; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .actions-btn { background: #0d6efd; color: white; border: none; padding: 4px 12px; border-radius: 3px; cursor: pointer; font-size: 0.78rem; margin-right: 4px; }
        .actions-del { background: #dc3545; color: white; border: none; padding: 4px 12px; border-radius: 3px; cursor: pointer; font-size: 0.78rem; }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="panel-title">👥 계약자 검색·조회</div>
        
        <div style="background:#e6f4ea;color:#1e7e34;padding:8px 12px;border-radius:4px;margin-bottom:15px;font-size:.78rem;">
💡 이 페이지는 이미 등록된 계약자 정보 조회 및 수정 전용 화면입니다. 신규등록은 「계약서」 입력시 자동생성됨
        </div>

        <form onsubmit="event.preventDefault();">
            <!-- 핵심 대조 필드 -->
            <div class="form-group">
                <label>상호명 또는 성명</label>
                <input type="text" class="form-control" placeholder="계약자 상호이름 or 성명 입력">
            </div>

            <div class="form-group">
                <label>사업자등록번호 (또는 주민번호 앞자리)</label>
                <input type="text" class="form-control" placeholder="예: 123-45-67890">
            </div>

            <!-- hidden 필드: 계약서는 항상 tenant_type=tenant으로 고정 -->
            <input type="hidden" name="tenant_type" value="contractor">
            
            <div class="btn-box">
                <button type="submit" class="btn btn-main" style="flex:1;">계약자 조회</button>
            </div>
        </form>
    </div>

    <!-- 우측: 이미 등록된 계약자 데이터 수정 패널 -->
    <div class="right-panel">
        <div class="panel-title">📋 등록済 계약자 명부 (조회/수정)</div>
        
        <div class="excel-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:50px">번호</th><th style="width:80px">호실 FK</th><th>상호/성명</th><th>식별번호</th><th>연락처</th><th>계약서FK</th><th style="width:100px">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>99</td><td>(주)C동102호</td><td>(주)네트웍스 파트너스</td><td>124-81-00000</td><td>010-1234-5678</td><td>C2025****</td>
                        <td style="text-align:center;">
                            <button class="actions-btn" onclick="editContractor(99)">수정</button>
                            <button class="actions-del" onclick="deleteContractor(99)">삭제</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>
</html>
