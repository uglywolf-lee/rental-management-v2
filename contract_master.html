<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>계약서 관리 시스템 (사무인력 전용)</title>
    <style>
        :root { 
            --primary: #fd7e14; 
            --secondary: #17a2b8; 
            --border: #dee2e6; 
            --bg: #f8f9fa; 
            --text-dark: #495057;
            --text-muted: #6c757d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: var(--bg); }

        .left-form-panel { width: 35%; background: white; border-right: 1px solid var(--border); padding: 12px; overflow-y: auto; box-sizing: border-box; scrollbar-width: thin; }
        .right-viewer-panel { width: 65%; display: flex; flex-direction: column; height: 100%; background: #fff; }

        .tab-nav { display: flex; gap: 4px; margin-bottom: 10px; border-bottom: 1px solid var(--border); background: white; position: sticky; top: 0; z-index: 5; }
        .tab-btn { padding: 6px 10px; background: none; border: none; border-bottom: 2px solid transparent; font-size: 0.8rem; font-weight: 600; color: var(--text-dark); cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        .tab-body { display: none; }
        .tab-body.active { display: block; }

        .panel-title { font-size: 1rem; color: var(--primary); margin: 5px 0 15px 0; font-weight: bold; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 0.78rem; font-weight: 600; margin-bottom: 3px; color: var(--text-dark); }
        .form-control { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.82rem; box-sizing: border-box; }
        
        .row-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-box { margin-top: 15px; display: flex; gap: 6px; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; font-size: 0.82rem; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: var(--text-muted); color: white; }
        
        /* 인라인 스타일 대체용 디자인 클래스 */
        .btn-secondary { background: var(--secondary); color: white; padding: 4px 10px; font-size: 0.75rem; white-space: nowrap; }
        .doc-card { border: 1px solid var(--border); border-radius: 4px; padding: 10px; margin-bottom: 10px; background: #f8f9fa; }
        .doc-card.broker-accent { border-left: 4px solid var(--secondary); }
        .doc-card-title { font-weight: 600; font-size: 0.8rem; margin-bottom: 6px; color: #333; }
        .flex-box { display: flex; gap: 4px; margin-bottom: 6px; }
        .status-txt { font-size: 0.78rem; color: var(--text-muted); font-weight: bold; padding: 4px 0; }

        .viewer-header { background: #f1f3f5; padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .viewer-header h3 { font-size: 0.9rem; color: #333; }
        .viewer-body { flex: 1; background: #525659; display: flex; justify-content: center; align-items: center; overflow: auto; position: relative; }
        .viewer-placeholder { color: #ccc; font-size: 0.85rem; text-align: center; }
        .viewer-image { max-width: 100%; max-height: 100%; object-fit: contain; }
        .viewer-pdf { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <div class="left-form-panel">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('tab-tenant', this)">1. 임차인 정보</button>
            <button class="tab-btn" onclick="switchTab('tab-conditions', this)">2. 계약 조건</button>
            <button class="tab-btn" onclick="switchTab('tab-docs', this)">3. 중개사 및 서류</button>
        </div>

        <form id="contractForm" onsubmit="event.preventDefault(); saveContract();">
            <div id="tab-tenant" class="tab-body active">
                <div class="panel-title">👤 임차인 인적사항 등록</div>
                <div class="form-group">
                    <label>상호명 또는 성명</label>
                    <input type="text" id="tenantName" class="form-control" placeholder="예: (주)네트웍스 파트너스" required>
                </div>
                <div class="form-group">
                    <label>대표자 성명</label>
                    <input type="text" id="tenantRep" class="form-control" placeholder="실명 기입" required>
                </div>
                <div class="form-group">
                    <label>전화번호</label>
                    <input type="text" id="tenantPhone" class="form-control" placeholder="010-1234-5678" maxlength="14" required oninput="validatePhone(this)">
                </div>
                <div class="form-group">
                    <label>이메일 주소</label>
                    <input type="email" id="tenantEmail" class="form-control" placeholder="이메일 입력" oninput="this.value = this.value.toLowerCase();">
                </div>
            </div>

            <div id="tab-conditions" class="tab-body">
                <div class="panel-title">💰 상세 계약 조건 설정</div>
                <div class="row-grid-2">
                    <div class="form-group">
                        <label>호실 정보</label>
                        <input type="text" id="roomInfo" class="form-control" placeholder="예: C동 102호" required>
                    </div>
                    <div class="form-group">
                        <label>계약 구분</label>
                        <select id="leaseType" class="form-control">
                            <option value="월세">월세</option>
                            <option value="전세">전세</option>
                        </select>
                    </div>
                </div>
                <div class="row-grid-2">
                    <div class="form-group">
                        <label>보증금 (원단위)</label>
                        <input type="number" id="depositAmount" class="form-control" placeholder="예: 10000000" required>
                    </div>
                    <div class="form-group">
                        <label>월세 (원단위)</label>
                        <input type="number" id="monthlyRent" class="form-control" placeholder="예: 500000" required>
                    </div>
                </div>
                <div class="row-grid-2">
                    <div class="form-group">
                        <label>계약 시작일</label>
                        <input type="date" id="startDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>계약 종료일</label>
                        <input type="date" id="endDate" class="form-control" required>
                    </div>
                </div>
            </div>

            <div id="tab-docs" class="tab-body">
                <div class="panel-title">🤝 협력 중개사 연동 (명부 동기화)</div>
                <div class="doc-card broker-accent">
                    <div class="doc-card-title">중개사 조회 및 내부 ID 매핑</div>
                    <div class="flex-box">
                        <input type="text" id="brokerSearchInput" class="form-control" placeholder="중개사 상호 또는 이름 입력...">
                        <button type="button" class="btn btn-secondary" onclick="searchBrokerPartner()">검색</button>
                    </div>
                    <div id="brokerSelectStatus" class="status-txt">
                        ℹ️ 현재 연결된 중개사 없음 (직접 거래 시 공란)
                    </div>
                </div>

                <div class="panel-title">📎 계약 증빙 서류 스캔본 첨부</div>
                <div class="doc-card">
                    <div class="doc-card-title">📄 파일 스캔본 등록 (PDF / JPG / PNG)</div>
                    <input type="file" id="contractFileDrop" class="form-control" accept=".pdf,.jpg,.jpeg,.png" onchange="previewUploadedFile(this)">
                </div>
            </div>

            <div class="btn-box">
                <button type="submit" class="btn btn-main">계약 데이터 최종 저장</button>
                <button type="button" class="btn btn-sub" onclick="resetContractForm()">폼 초기화</button>
            </div>
        </form>
    </div>

    <div class="right-viewer-panel">
        <div class="viewer-header">
            <h3 id="viewerHeaderTitle">📄 통합 계약 서류 및 증빙자료 뷰어 채널</h3>
        </div>
        <div class="viewer-body" id="viewerDisplayArea">
            <div class="viewer-placeholder" id="viewerDefaultPlaceholder">
                파일을 업로드하면 이곳에 고해상도로 즉시 렌더링됩니다.
            </div>
        </div>
    </div>

    <script>
        function validatePhone(obj) {
            let val = obj.value.replace(/[^0-9]/g, '');
            if (val.length > 3 && val.length <= 7) {
                obj.value = val.substring(0, 3) + '-' + val.substring(3);
            } else if (val.length > 7) {
                obj.value = val.substring(0, 3) + '-' + val.substring(3, 7) + '-' + val.substring(7, 11);
            } else {
                obj.value = val;
            }
        }

        function switchTab(tabId, btnObj) {
            document.querySelectorAll('.tab-body').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnObj.classList.add('active');
        }

        function searchBrokerPartner() {
            const keyword = document.getElementById('brokerSearchInput').value.trim();
            const statusDiv = document.getElementById('brokerSelectStatus');
            
            if(!keyword) return alert('검색할 협력 중개사명을 입력해 주세요.');
            
            if(keyword.includes('팩토리') || keyword.includes('김중개')) {
                statusDiv.innerText = `✅ 연동완료: [공인중개사 팩토리] 계약 바인딩 완료`;
                statusDiv.style.color = 'green';
            } else {
                alert('협력사 명부(partner_roster)에서 중개사를 찾을 수 없습니다.');
                statusDiv.innerText = `❌ 연동 실패: 등록되지 않은 협력사`;
                statusDiv.style.color = 'red';
            }
        }

        function previewUploadedFile(inputObj) {
            const file = inputObj.files[0];
            const area = document.getElementById('viewerDisplayArea');
            if (file) {
                const reader = new FileReader();
                const ext = file.name.split('.').pop().toLowerCase();
                reader.onload = function(e) {
                    area.innerHTML = '';
                    if (ext === 'pdf') {
                        area.innerHTML = `<iframe src="${e.target.result}" class="viewer-pdf"></iframe>`;
                    } else if (['jpg', 'jpeg', 'png'].includes(ext)) {
                        area.innerHTML = `<img src="${e.target.result}" class="viewer-image">`;
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function resetContractForm() {
            document.getElementById('contractForm').reset();
            document.getElementById('brokerSelectStatus').innerText = `ℹ️ 현재 연결된 중개사 없음 (직접 거래 시 공란)`;
            document.getElementById('brokerSelectStatus').style.color = '';
            document.getElementById('viewerDisplayArea').innerHTML = `<div class="viewer-placeholder">파일을 업로드하면 이곳에 즉시 렌더링됩니다.</div>`;
            switchTab('tab-tenant', document.querySelectorAll('.tab-btn')[0]);
        }

        function saveContract() {
            alert(`[계약서 등록 완료] 데이터가 규격에 맞춰 안전하게 인서트되었습니다.`);
            resetContractForm();
        }
    </script>
</body>
</html>
