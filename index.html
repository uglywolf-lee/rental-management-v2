<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>부동산管理系统 통합메인</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body { margin-top:64px;background:linear-gradient(135deg,#f5f7fa,#e4e8ec);font-family:'Segoe UI','Malgun Gothic',sans-serif;min-height:100vh }
  #topBar{position:fixed;top:0;left:0;right:0;height:64px;z-index:9999;background:linear-gradient(90deg,#1a1f36,#2d3561,#1a1f36);box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:3px solid #3498db}
  .logo-area{display:flex;align-items:center;gap:12px;min-width:220px}
  .logo-icon{width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,#3498db,#2980b9);display:flex;align-items:center;justify-content:center;font-size:24px;color:white;box-shadow:0 2px 8px rgba(52,152,219,.4)}
  .logo-text{color:#ecf0f1;font-size:18px;font-weight:700;letter-spacing:-.5px}
  .menu-area{display:flex;align-items:center;gap:6px;flex:1;justify-content:center;overflow-x:auto;padding:8px 0}
  .menu-btn{color:#bdc3c7 !important;text-decoration:none;padding:8px 14px;border-radius:6px;font-size:13.5px;white-space:nowrap;background:transparent;border:1px solid transparent;transition:all .2s ease;cursor:pointer;position:relative;overflow:hidden}
  .menu-btn:hover{background:rgba(52,152,219,.15);color:#ecf0f1 !important;border-color:rgba(52,152,219,.4);transform:translateY(-1px)}
  .menu-btn.active{background:linear-gradient(135deg,#3498db,#2c85d1) !important;color:white !important;border-color:#2980b9;box-shadow:0 3px 12px rgba(52,152,219,.4);font-weight:600}
  .menu-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transition:left .5s ease}
  .menu-btn:hover::before{left:100%}
  .user-area{display:flex;align-items:center;gap:12px;min-width:240px;justify-content:flex-end}
  #empBadge{background:rgba(46,204,113,.15);color:#2ecc71;padding:6px 10px;border-radius:20px;font-size:12.5px;border:1px solid rgba(46,204,113,.3);white-space:nowrap}
  .logout-btn{color:#e74c3c !important;background:transparent;border:1.5px solid #c0392b;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;gap:4px;white-space:nowrap}
  .logout-btn:hover{background:#c0392b;color:white !important;border-color:#e74c3c;transform:scale(1.05)}</style>
</head>
<body>

<div id="topBar">
  <div class="logo-area"><div class="logo-icon">🏢</div><div class="logo-text">부동산管理시스템</div></div>
  <div id="menuArea" class="menu-area"></div>
  <div class="user-area">
    <span id="empBadge">EMP-001님</span>
    <span id="creatorBadge">제작자모드</span>
    <button class="logout-btn" onclick="window.authModule.logout()"><span></span> 로그아웃</button>
  </div>
</div>

<iframe id="mainFrame" src="g_h_i_dashboard.html"></iframe>

<script src="auth.js"></script>
<script>
(function(){
  var user = window.authModule.checkLogin();
  if (!user.loggedIn) return;

  var role = user.role;
  var emp = user.emp || 'EMP-001';
  var btns = window.authModule.getButtonsByRole(role);

  var mainFrame = document.getElementById('mainFrame');
  var menuArea = document.getElementById('menuArea');

  btns.forEach(function(b){
    var a = document.createElement('a')
    a.href = 'javascript:void(0)';
    a.className = 'menu-btn';
    a.textContent = b.l;
    
    // [BUGFIX] mainFrame.src 실제 iframe 요소의 src 경로 바인딩
    if(mainFrame.src.indexOf(b.p) !== -1) a.classList.add('active');
    
    // 클릭시 iframe로딩 + 활성화
    a.onclick = function(){ window.loadPage(b.p, this); };
    menuArea.appendChild(a);
  });

  // 제작자모드표현
  if(window.authModule.isCreatorBypass) {
    document.getElementById('creatorBadge').style.display = 'inline-block';
  }

  // 사용자명표시
  document.getElementById('empBadge').textContent = emp + '님';

  // 페이지로딩함수
  window.loadPage = function(page, obj) {
    mainFrame.src = page;
    var allBtns = document.querySelectorAll('.menu-btn');
    for(var i=0;i<allBtns.length;i++) allBtns[i].classList.remove('active');
    if(obj) obj.classList.add('active');
  };
})();
</script>
</body>
</html>
