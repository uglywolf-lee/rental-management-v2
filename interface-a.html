<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>부동산 자산 및 호실 관리 (엑셀 통합형)</title>
    <style>
        :root { 
            --primary: #28a745; 
            --border: #dee2e6; 
            --bg: #f8f9fa; 
            --text-dark: #495057;
            --text-muted: #6c757d;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;  
            display: flex; 
            height: calc(100vh - 64px); 
            overflow: hidden; 
            background: var(--bg); 
        }
        
        .left-panel { width: 35%; background: white; border-right: 1px solid var(--border); padding: 25px; overflow-y: auto; box-sizing: border-box; }
        .right-panel { width: 65%; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; background: white; }
        .panel-title { font-size: 1.1rem; color: var(--primary); margin: 0 0 20px 0; border-bottom: 2px solid var(--primary); padding-bottom: 8px; font-weight: bold; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 4px; color: var(--text-dark); }
        .form-control { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.88rem; box-sizing: border-box; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-box { margin-top: 15px; display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 4px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: #6c757d; color: white; }
        
        .excel-table-wrap { flex: 1; overflow: auto; border: 1px solid #bbc4cc; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th { background: #f1f3f5; border: 1px solid #bbc4cc; padding: 6px 8px; font-weight: 600; position: sticky; top: 0; text-align: center; color: #212529; white-space: nowrap; }
        td { border: 1px solid #ced4da; padding: 4px 8px; white-space: nowrap; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #e8f4fd; cursor: pointer; }
        
        .cell-text-center { text-align: center; }
        .cell-num-right { text-align: right; }
        
        .col-no { min-width: 45px; max-width: 60px; width: 50px; text-align: right; }
        .th-no { min-width: 45px; max-width: 60px; width: 50px; text-align: center; }
        .col-active { min-width: 55px; max-width: 70px; width: 60px; text-align: right; }
        .th-active { min-width: 55px; max-width: 70px; width: 60px; text-align: center; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="panel-title">🏠 A. 부동산/호실 인프라등록</div>
        <form onsubmit="handleAssetSubmit(event)">
            <div class="form-group">
                <label>건물명</label>
                <input type="text" class="form-control" id="buildingName" placeholder="예: 구로 디지털 타워 A동" required>
            </div>
            <div class="form-group">
                <label>실제 주소</label>
                <input type="text" class="form-control" id="actualAddress" placeholder="식별 및 연동 주소 입력" required>
            </div>
            <div class="form-group">
                <label>배정 층수</label>
                <input type="number" class="form-control" id="assignedFloor">
            </div>
            <div class="form-group">
                <label>호실 번호</label>
                <input type="text" class="form-control" id="roomNumber" placeholder="예: 101호" required>
            </div>
            <div class="form-group">
                <label>전용 면적 ㎡</label>
                <input type="number" step="0.001" class="form-control" id="roomArea" placeholder="소수점 3자리">
            </div>
            <div class="btn-box">
                <button type="submit" class="btn btn-main">신규 자산 등록</button>
                <button type="button" class="btn btn-sub" onclick="handleAssetUpdate()">현황 변경 (수정)</button>
            </div>
        </form>
    </div>

    <div class="right-panel">
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 10px;">
            <input type="text" class="form-control" placeholder="건물명, 주소, 호실, 입주자 등 통합 검색...">
            <button class="btn btn-main" style="flex:none; width:80px;">검색</button>
        </div>
        <div class="excel-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th class="th-no">No.</th>
                        <th>건물명</th>
                        <th>주소</th>
                        <th>층수</th>
                        <th>호실</th>
                        <th>면적 (㎡)</th>
                        <th>입주자 정보 (상호/성명)</th>
                        <th>상태</th>
                        <th class="th-active">활성</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="col-no">1</td>
                        <td class="cell-text-center">구로 테크노타운</td>
                        <td class="cell-text-center">서울시 구로구 디지털로 30길 12</td>
                        <td class="cell-text-center">2</td>
                        <td class="cell-text-center">201호</td>
                        <td class="cell-num-right">84.320</td>
                        <td class="cell-text-center">(주)네트웍스 파트너스</td>
                        <td class="cell-text-center">입주중</td>
                        <td class="col-active">1</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
function handleAssetSubmit(event) {
    event.preventDefault();
    clearRoomInputs();
}

function handleAssetUpdate() {
    clearRoomInputs();
}

function clearRoomInputs() {
    document.getElementById('roomNumber').value = '';
    document.getElementById('roomArea').value = '';
    document.getElementById('roomStatus').selectedIndex = 0;
    document.getElementById('roomNumber').focus();
}
</script>
</body>
</html>
