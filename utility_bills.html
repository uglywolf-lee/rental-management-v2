<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리공과금 고지 장부 (엑셀 통합형)</title>
    <style>
        :root { --primary: #dc3545; --border: #dee2e6; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        .left-panel { width: 35%; background: white; border-right: 1px solid var(--border); padding: 25px; overflow-y: auto; box-sizing: border-box; }
        .right-panel { width: 65%; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; background: white; }
        .panel-title { font-size: 1.1rem; color: var(--primary); margin: 0 0 20px 0; border-bottom: 2px solid var(--primary); padding-bottom: 8px; font-weight: bold; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 4px; color: #495057; }
        .form-control { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.88rem; box-sizing: border-box; }
        .btn-box { margin-top: 15px; display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 4px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: #6c757d; color: white; }
        .excel-table-wrap { flex: 1; overflow: auto; border: 1px solid #bbc4cc; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th { background: #f1f3f5; border: 1px solid #bbc4cc; padding: 6px 8px; font-weight: 600; position: sticky;top: 0；text-align: left; }
        td { border: 1px solid #ced4da; padding: 6px 8px; white-space: nowrap; }
        tr:nth-child(even) { background-color: #f8f9fa; color: #333; }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="panel-title">⚡ D. 공과금 수납 및 청구 등록</div>
        <form onsubmit="event.preventDefault();">
            <div class="form-group">
                <label>청구 대상 호실고유번호</label>
                <input type="number" class="form-control" required>
            </div>
            <div class="form-group">
                <label>고지 대상 임차인 고유번호</label>
                <input type="number" class="form-control" placeholder="미지정시 현재 입주자 자동선정">
            </div>
            <div class="form-group">
                <label>공과금 유형 (전기/수도/난방/관리비/통신)</label>
                <select class="form-control">
                    <option>전기요금</option><option>수도요금</option><option>난방비</option><option>관리비</option><option>통신비</option>
                </select>
            </div>
            <div class="form-group">
                <label>고지 청구금액 (원)</label>
                <input type="number" class="form-control" placeholder="정수 금액 입력" required>
            </div>
            <div class="form-group">
                <label>납부기한</label>
                <input type="date" class="form-control" required>
            </div>
    
            <div class="btn-box">
                <button type="submit" class="btn btn-main">공과금 고지 등록</button>
                <button type="button" class="btn btn-sub">납부확인 / 금액수정</button>
            </div>
        </form>
    </div>
    <div class="right-panel">
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 10px;">
            <input type="text" class="form-control" placeholder="미납 상태(is_paid=0) 또는 항목별 청구 내역 실시간 필터...">
            <button class="btn btn-main" style="flex:none; width:80px;"><!-- -->회계 조회</button>
        </div>
        <div class="excel-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>No.</th><th>호실고유번호</th><th>임차인고유번호</th><th>공과금종류</th><th>청구금액(원)</th><th>납부기한(요일)</th><th>수납상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>5501</td><td>Room-45</td><td>User-99</td><td>전기요금</td><td>245,600원</td><td>2026-07-25 (토)</td><td style="color:red; font-weight:bold;">미납</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
