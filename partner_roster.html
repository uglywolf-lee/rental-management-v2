<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>협력사 인적 데이터 명부 (broker/partner)</title>
    <style>
        :root { --primary: #17a2b8; --border: #dee2e6; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0 !important; display: flex; height: calc(100vh - 64px); overflow-y: auto; background-color: var(--bg); }
        .left-panel { width: 35%; background: white; border-right: 1px solid var(--border); padding: 25px; box-sizing: border-box; }
        .right-panel { flex: 1; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; background: white; }
        .panel-title { font-size: 1.1rem; color: var(--primary); margin: 0 0 20px 0; border-bottom: 2px solid var(--primary); padding-bottom: 8px; font-weight: bold; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 4px; color: #495057; }
        .form-control { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.88rem; box-sizing: border-box; }
        .date-range-wrap { display: flex; align-items: center; gap: 8px; }
        .date-separator { color: #6c757d; font-size: 0.85rem; font-weight: bold; }
        .filter-divider { text-align: center; color: #6c757d; font-size: 0.8rem; margin: 20px 0 15px 0; position: relative; }
        .btn-box { margin-top: 15px; display: flex; gap: 8px; }
        .btn { padding: 10px; border: none; border-radius: 4px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: #6c757d; color: white; }
        .excel-table-wrap { flex: 1; overflow: auto; border: 1px solid #bbc4cc; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th { background: #f1f3f5; border: 1px solid #bbc4cc; padding: 6px 8px; font-weight: 600; position: sticky; top: 0; text-align: left; white-space: nowrap; }
        td { border: 1px solid #ced4da; padding: 6px 8px; white-space: nowrap; color: #333; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .actions-btn { background: #0d6efd; color: white; border: none; padding: 4px 12px; border-radius: 3px; cursor: pointer; font-size: 0.78rem; margin-right: 4px; }
        .doc-card { border: 1px solid var(--border); border-radius: 4px; padding: 8px; margin-bottom: 8px; background: #f8f9fa; }
        .doc-card-title { font-weight: 600; font-size: 0.72rem; margin-bottom: 4px; color: #495057; }
    </style>
</head>
<body>
    <!-- 좌측 -->
    <div class="left-panel">
        <div class="panel-title" style="font-size:.95rem;">👥 협력사 검색·조회</div>
        
        <form onsubmit="event.preventDefault(); searchPartner();">
            <!-- 최상위: 전체 검색 -->
            <div class="form-group">
                <label>전체검색</label>
                <input type="text" class="form-control" id="globalSearchInput" placeholder="이름·전화·호실 입력">
            </div

>
            <div class="form-group">
                <label>호실</label>
                <select class="form-control" id="roomFilter">
                    <option value="">(전체)</option>
                    <option value="A">A동</option>
                    <option value="B">B동</option>
                    <option value="C">C동</option>
                </select>
            </div>

            <div class="form-group">
                <label>등록/갱신 기간</label>
                <div class="date-range-wrap">
                    <input type="date" class="form-control" id="startDate">
                    <span class="date-separator">~</span>
                    <input type="date" class="form-control" id="endDate">
                </div>
            </div>

            <div class="filter-divider">—— 상세 필터 ——</div>

            <div class="form-group">
                <label>신분증/사업자등록증 사본 업로드</label>
                <div class="doc-card">
                    <div class="doc-card-title">📄 신분증 사본</div>
                    <input type="file" class="form-control" accept=".pdf,.jpg.jpeg,.png">
                </div>
            </div>

            <!-- 등록 버튼 -->
            <div class="btn-box">
                <button type="submit" class="btn btn-main" style="flex:1;">전체검색</button>
            </div>
        </form>
    </div>

    <!-- 우측: 등록된 협력사 명부 -->
    <div class="right-panel">
        <div class="panel-title" style="font-size:.95rem;">📋 등록된 협력사 명부 (조회/수정)</div>
        
        <div class="excel-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:50px">번호</th>
                        <th style="width:80px">호실</th>
                        <th style="width:160px">협력사 상호/성명</th>
                        <th style="width:120px">전화번호</th>
                        <th style="width:90px">등록일</th>
                        <th style="width:90px">갱신일</th>
                        <th style="width:60px">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 실제 데이터 API 연동 예정 -->
                    <tr onclick="selectPartner(1)">
                        <td>1</td><td>A동</td><td>공인중개사 팩토리</td><td>010-9876-5432</td><td style="text-align:center;">2026-01-10</td><td style="text-align:center;">2026-07-20</td>
                        <td style="text-align:center;"><button class="actions-btn" onclick="editPartner(1)">수정</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function searchPartner() {
            const query = document.getElementById('globalSearchInput').value.trim();
            alert(`'${query} 조건으로 협력사 검색을 실행합니다. (API 연동 예정)`);
        }

        function editPartner(id) {
            alert(`${id}번 협력사 수정 모드입니다.`);
        }

        function selectPartner(id) {
            // 상세 정보 패널 이동 또는 계약서 탭으로 연결
            alert(`협력사 ${id} 선택됨. 계약서에서 broker_id(${id}) 매핑.`);
        }
    <script>
</body>
</html
